name: Deploy to Minikube using GitHub Actions

on: [push]

jobs:
  job1:
    runs-on: ubuntu-latest
    name: Build Node.js Docker image and deploy to minikube
    steps:
    - uses: actions/checkout@v2

    - name: Start minikube
      uses: medyagh/setup-minikube@master

    - name: Try the cluster!
      run: kubectl get pods -A

    - name: Build image
      run: |
          export SHELL=/bin/bash
          eval $(minikube -p minikube docker-env)
          docker build -f ./Dockerfile -t devopshint/node-app:latest .
          echo "=== Verifying images ==="
          docker images | grep node-app

    - name: Deploy and wait for pods
      run: |
        kubectl apply -f k8s-node-app.yaml
        echo "=== Waiting for pods to be created ==="
        sleep 5
        kubectl get pods
        echo "=== Waiting for pods to be ready (up to 60 seconds) ==="
        kubectl wait --for=condition=ready pod -l app=nodejs-app --timeout=60s
        echo "=== Pods are ready ==="
        kubectl get pods
        echo "=== Pod logs ==="
        kubectl logs -l app=nodejs-app

    - name: Test service URLs
      run: |
          echo "=== Service list ==="
          minikube service list
          echo "=== Service URL ==="
          minikube service nodejs-app --url
